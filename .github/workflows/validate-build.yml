name: Validate generated build

on:
  push:
    branches:
      - master
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/validate-build.yml"
  pull_request:
    branches:
      - master
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/validate-build.yml"

permissions:
  contents: read

jobs:
  validate-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build bundle
        run: npm run build

      - name: Verify generated bundle is committed
        run: git diff --exit-code -- dist/custom-badge.js
